<!DOCTYPE html>
<html>
	<head>
		<title>kitty</title>
		<meta name="viewport" content="user-scalable=no,initial-scale=1,maximum-scale=1,minimum-scale=1,width=device-width">
		<link rel="stylesheet" type="text/css" href="./style.css">
		<style>
			
			body {
            background-image: url("img/StarBG.png");
            background-repeat: repeat;
            animation: animatedBackground 6s linear infinite;
        }

        @keyframes animatedBackground {
            from { background-position: 0 0; }
            to { background-position: -256px -256px; }
        }
    
		</style>
        <link rel="stylesheet" type="text/css" href="./mouseStyles.css">
		<script src="./libraries/p5.min.js"></script>
		<script src="./libraries/p5.clickable.min.js"></script>
        <script src="./particles.js"></script>
		<meta content="https://stellawisps.gay" property="og:url" />
		<meta content="#43B581" data-react-helmet="true" name="theme-color" />

	</head>

	<body>
		
		<script src="./sketch.js"></script>
		<script>
			function touchHandler(event)
{
    var touches = event.changedTouches,
        first = touches[0],
        type = "";
    switch(event.type)
    {
        case "touchstart": type = "mousedown"; break;
        case "touchmove":  type = "mousemove"; break;        
        case "touchend":   type = "mouseup";   break;
        default:           return;
    }

    // initMouseEvent(type, canBubble, cancelable, view, clickCount, 
    //                screenX, screenY, clientX, clientY, ctrlKey, 
    //                altKey, shiftKey, metaKey, button, relatedTarget);

    var simulatedEvent = document.createEvent("MouseEvent");
    simulatedEvent.initMouseEvent(type, true, true, window, 1, 
                                  first.screenX, first.screenY, 
                                  first.clientX, first.clientY, false, 
                                  false, false, false, 0/*left*/, null);

    first.target.dispatchEvent(simulatedEvent);
    event.preventDefault();
}

function init() 
{
    document.addEventListener("touchstart", touchHandler, true);
    document.addEventListener("touchmove", touchHandler, true);
    document.addEventListener("touchend", touchHandler, true);
    document.addEventListener("touchcancel", touchHandler, true);    
}
		</script>
	</body> 
</html>
